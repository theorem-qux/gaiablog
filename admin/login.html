<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン - 数と日々の記録</title>
  <meta name="description" content="管理者ページへのログイン">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="admin-style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="login-page">
  <div class="login-box">
    <h1>管理者ログイン</h1>
    <p class="login-subtitle">数と日々の記録 — 管理システム</p>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="login-id">ユーザーID</label>
        <input type="text" id="login-id" name="username" autocomplete="username" placeholder="" spellcheck="false">
      </div>
      <div class="form-group">
        <label for="login-pw">パスワード</label>
        <input type="password" id="login-pw" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn">ログイン</button>
      <div class="error-msg" id="error-msg">IDまたはパスワードが正しくありません。</div>
    </form>
  </div>

  <script src="auth.js"></script>
</body>
</html>
